name: CI - Email Sender Kafka

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Make email-api Maven Wrapper executable
        run: chmod +x ./email-api/mvnw

      - name: Run email-api tests
        working-directory: ./email-api
        run: ./mvnw clean test

      - name: Make email-worker Maven Wrapper executable
        run: chmod +x ./email-worker/mvnw

      - name: Run email-worker tests
        working-directory: ./email-worker
        run: ./mvnw clean test